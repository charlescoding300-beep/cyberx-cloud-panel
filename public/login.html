<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBER X CLOUD // Login</title>
<link rel="stylesheet" href="/css/main.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<canvas id="rain"></canvas><div class="crt"></div>
<div class="auth-wrap">
  <div class="auth-card glass">
    <h1>CYBER X CLOUD</h1>
    <div class="auth-tagline">root@cyberx:~$ authenticate</div>
    <div class="flex" style="flex-direction:column;gap:10px;margin-bottom:18px"><a href="/api/auth/google" class="btn" style="text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px">🔵 Continue with Google</a><a href="/api/auth/github" class="btn" style="text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px">⚫ Continue with GitHub</a></div><div class="muted" style="font-size:10px;letter-spacing:1px;margin-bottom:18px">— OR —</div><form id="login-form">
      <div class="field"><label>USERNAME</label><input type="text" id="username" required autocomplete="username"></div>
      <div class="field"><label>PASSWORD</label><input type="password" id="password" required autocomplete="current-password"></div>
      <button type="submit" class="btn">&gt; LOGIN</button>
      <div class="auth-error" id="error"></div>
    </form>
    <div class="auth-switch">New here? <a href="/signup">Create an account</a></div>
  </div>
</div>
<script src="/js/matrixRain.js"></script>
<script src="/js/sounds.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  CYBERX_SOUNDS.sndClick();
  const errorEl = document.getElementById('error');
  errorEl.textContent = '';
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.ok) {
      CYBERX_SOUNDS.sndSuccess();
      window.location.href = '/dashboard';
    } else {
      CYBERX_SOUNDS.sndError();
      errorEl.textContent = '> ' + data.error;
    }
  } catch (err) {
    CYBERX_SOUNDS.sndError();
    errorEl.textContent = '> connection error';
  }
});
</script>
</body>
</html>
